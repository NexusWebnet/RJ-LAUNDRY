<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - RJ Laundry</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/customer_dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2>My Orders</h2>
        </div>
    </nav>

    <!-- Tabs -->
    <div class="order-tabs">
        <button class="tab-btn active" onclick="switchTab(0)">Active (2)</button>
        <button class="tab-btn" onclick="switchTab(1)">Completed</button>
        <button class="tab-btn" onclick="switchTab(2)">Cancelled</button>
    </div>

    <section class="orders-section">
        <div class="container">

            <!-- Active Orders -->
            <div class="order-list active-orders">

                <!-- Order 1 -->
                <div class="order-card" data-aos="fade-up">
                    <div class="order-header">
                        <div class="order-id">#RJ12345</div>
                        <span class="status active">At Laundry</span>
                    </div>
                    <div class="order-details">
                        <p><strong>Wash & Iron</strong> • 5.0 kg</p>
                        <p>Pickup: 27 May 2025</p>
                        <p>Delivery: 29 May 2025</p>
                    </div>
                    <button class="btn track-btn" onclick="trackOrder('#RJ12345')">Track</button>
                </div>

                <!-- Order 2 -->
                <div class="order-card" data-aos="fade-up">
                    <div class="order-header">
                        <div class="order-id">#RJ13344</div>
                        <span class="status">Picked Up</span>
                    </div>
                    <div class="order-details">
                        <p><strong>Dry Cleaning</strong> • 3 items</p>
                        <p>Pickup: 25 May 2025</p>
                        <p>Delivery: 28 May 2025</p>
                    </div>
                    <button class="btn track-btn" onclick="trackOrder('#RJ13344')">Track</button>
                </div>

            </div>

            <!-- Completed Orders -->
            <div class="order-list completed-orders hidden">
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">#RJ12340</div>
                        <span class="status completed">Completed</span>
                    </div>
                    <div class="order-details">
                        <p><strong>Only Iron</strong> • 4 items</p>
                        <p>Delivered on 20 May 2025</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-bell"></i>
            <span>Notifications</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="dashboard.js"></script>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.order-list').forEach(list => list.classList.add('hidden'));
            
            document.querySelectorAll('.tab-btn')[tab].classList.add('active');
            document.querySelectorAll('.order-list')[tab].classList.remove('hidden');
        }

        function trackOrder(orderId) {
            alert(`Tracking order: ${orderId}`);
            window.location.href = 'track-order.html';
        }
    </script>
</body>
</html>
