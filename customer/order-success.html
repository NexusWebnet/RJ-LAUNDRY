<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - RJ Laundry</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/customer_dashboard.css">
</head>
<body>

    <section class="success-section">
        <div class="container">

            <!-- Success Animation -->
            <div class="success-icon" data-aos="zoom-in">
                <div class="check-circle">
                    <i class="fas fa-check"></i>
                </div>
            </div>

            <h1>Order Placed Successfully! 🎉</h1>
            <p class="order-number">Your order <strong>#RJ12345</strong> has been placed successfully.</p>

            <!-- Order Details -->
            <div class="order-details">
                <div class="detail-item">
                    <div class="detail-label">Pickup</div>
                    <div class="detail-value">27 May 2025, 9:00 AM - 11:00 AM</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Delivery</div>
                    <div class="detail-value">29 May 2025, 4:00 PM - 6:00 PM</div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="success-actions">
                <a href="track-order.html" class="btn btn-track">Track Order</a>
                <a href="../customer/dashboard.html" class="btn btn-home">Back to Home</a>
            </div>

        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="dashboard.js"></script>

    <script>
        // Confetti Animation
        function createConfetti() {
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.backgroundColor = ['#00A651', '#FF9800', '#4285f4', '#f44336'][Math.floor(Math.random()*4)];
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            createConfetti();
        });
    </script>
</body>
</html>
