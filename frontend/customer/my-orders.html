<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - RJ Laundry</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/customer_dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="RJ Laundry" class="logo-img">
            </a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../services.html">Services</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="place-order.html">Place Order</a></li>
            </ul>
            <div class="nav-actions">
                <div class="user-info" id="userInfo">Loading...</div>
                <a href="#" onclick="logout()" class="btn btn-login">Logout</a>
            </div>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Tabs -->
    <div class="order-tabs">
        <button class="tab-btn active" onclick="switchTab(0)">Active</button>
        <button class="tab-btn" onclick="switchTab(1)">Completed</button>
    </div>

    <section class="orders-section">
        <div class="container">
            <!-- Active Orders -->
            <div class="order-list active-orders" id="activeOrders">
                <!-- Populated by JS -->
            </div>

            <!-- Completed Orders -->
            <div class="order-list completed-orders hidden" id="completedOrders">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-col">
                    <div class="footer-logo">
                        <i class="fas fa-tshirt"></i> RJ Laundry
                    </div>
                    <p>Professional laundry service with reliable pickup and delivery across Ghana.</p>
                </div>
                <div class="footer-col">
                    <h4>Quick Links</h4>
                    <ul class="footer-links">
                        <li><a href="../services.html">Services</a></li>
                        <li><a href="dashboard.html">Dashboard</a></li>
                        <li><a href="track-order.html">Track Order</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 RJ Laundry. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="dashboard.js"></script>
    <script src="../index.js"></script>

    <script>
   async function loadOrders() {
    const userStr = localStorage.getItem('currentUser');
    console.log("Stored user data:", userStr); // Debug

    if (!userStr) {
        window.location.href = "../login.html";
        return;
    }

    const user = JSON.parse(userStr);

    // Show user name
    document.getElementById('userInfo').innerHTML = `<span style="color:white;">${user.full_name || 'User'}</span>`;

    // Get user ID - try all possible keys
    const userId = user.user_id || user.id || user.id;

    console.log("User ID used:", userId);

    if (!userId) {
        console.error("User ID not found in localStorage");
        alert("Please login again");
        window.location.href = "../login.html";
        return;
    }

    try {
        const response = await fetch(`http://localhost:5000/api/orders?user_id=${userId}`);
        const result = await response.json();

        if (result.success) {
            renderOrders(result.data);
        } else {
            console.error(result.message);
            document.getElementById('activeOrders').innerHTML = '<p>No orders found.</p>';
        }
    } catch (error) {
        console.error("Failed to load orders", error);
        document.getElementById('activeOrders').innerHTML = '<p>Could not load orders. Server error.</p>';
    }
}
    function renderOrders(orders) {
        const activeList = document.getElementById('activeOrders');
        const completedList = document.getElementById('completedOrders');

        activeList.innerHTML = '';
        completedList.innerHTML = '';

        if (!orders || orders.length === 0) {
            activeList.innerHTML = '<p>No orders found yet.</p>';
            return;
        }

        orders.forEach(order => {
            const card = `
                <div class="order-card" data-aos="fade-up">
                    <div class="order-header">
                        <div class="order-id">#${order.order_number}</div>
                        <span class="status ${order.status.toLowerCase()}">${order.status}</span>
                    </div>
                    <div class="order-details">
                        <p><strong>${order.services || 'Multiple Services'}</strong></p>
                        <p>Total: GH₵${parseFloat(order.total_amount).toFixed(2)}</p>
                        <p>Placed: ${new Date(order.created_at).toLocaleDateString()}</p>
                    </div>
                    <button class="btn track-btn" onclick="trackOrder('${order.order_number}')">Track</button>
                </div>
            `;

            if (['Delivered', 'Completed'].includes(order.status)) {
                completedList.innerHTML += card;
            } else {
                activeList.innerHTML += card;
            }
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.order-list').forEach(list => list.classList.add('hidden'));

        document.querySelectorAll('.tab-btn')[tab].classList.add('active');
        document.querySelectorAll('.order-list')[tab].classList.remove('hidden');
    }

    function trackOrder(orderNumber) {
        alert(`Tracking order: ${orderNumber}`);
        // Redirect to track-order.html later
        // window.location.href = `track-order.html?order=${orderNumber}`;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = "../login.html";
    }

    console.log("=== DEBUG: LocalStorage Content ===");
    console.log(localStorage.getItem('currentUser'));

    // Initialize when page loads
    window.onload = loadOrders;
</script>
</body>
</html>
