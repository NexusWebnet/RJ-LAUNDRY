<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RJ Laundry</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <!-- Navbar -->
   

    <!-- Login Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-form" data-aos="fade-up">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email or Phone Number</label>
                        <input type="text" id="loginIdentifier" placeholder="Email or Phone" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <a href="dashboard.html"><button type="submit" class="btn btn-login">Login</button></a>
                </form>

                <!-- Social Login (Moved Below) -->
                <div class="social-login">
                    <button class="social-btn google-btn">
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                    <button class="social-btn apple-btn">
                        <i class="fab fa-apple"></i>
                        Continue with Apple
                    </button>
                </div>

                <div class="auth-switch">
                    Don't have an account? 
                    <a href="register.html">Register here</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="index.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Login successful! (Demo Mode)");
        });

        document.querySelector('.google-btn').addEventListener('click', () => {
            alert("Redirecting to Google Sign In...");
        });

        document.querySelector('.apple-btn').addEventListener('click', () => {
            alert("Redirecting to Apple Sign In...");
        });
    </script>
</body>
</html>
