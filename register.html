<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RJ Laundry</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    

    <!-- Registration Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-form" data-aos="fade-up">
                <!-- Logo at Top -->
            <div class="auth-logo">
                <img src="../assets/images/logo.png" alt="RJ Laundry" class="logo-img-big">
            </div>
            
                <h2>Create Account</h2>
                <p>Join RJ Laundry today</p>


                <!-- Email Registration Form -->
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="055-000-0000" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                    </div>

                    <button type="submit" class="btn btn-register">Create Account</button>
                </form>

                 <!-- Social Login -->
                <div class="social-login">
                    <button class="social-btn google-btn">
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                    <button class="social-btn apple-btn">
                        <i class="fab fa-apple"></i>
                        Continue with Apple
                    </button>
                </div>

                <div class="auth-switch">
                    Already have an account? 
                    <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="index.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            alert("Account created successfully! 🎉");
            // In real project, send data to backend
        });

        // Social Login Buttons (Demo)
        document.querySelector('.google-btn').addEventListener('click', () => {
            alert("Redirecting to Google Sign Up...");
        });

        document.querySelector('.apple-btn').addEventListener('click', () => {
            alert("Redirecting to Apple Sign Up...");
        });
    </script>
</body>
</html>
